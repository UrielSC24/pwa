name: K6 Performance Test, SonarQube Analysis and CD

on:
  push:
    branches: [ main ] # Se activa con cada commit a la rama main

# --- VARIABLES GLOBALES CORREGIDAS A MINÚSCULAS ---
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: urielsc24/pwa

jobs:
  # --- JOB 1: ANÁLISIS DE SEGURIDAD (SONARQUBE) ---
  Analysis-SAST:
    name: Análisis SAST con SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=pwa

  # --- JOB 2: PRUEBAS DE CARGA (K6) ---
  performance_test:
    name: Ejecución de Pruebas de Carga
    needs: Analysis-SAST 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run k6 cloud test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6_pruebas.js
          flags: --out cloud
          token: ${{ secrets.K6_CLOUD_TOKEN }} 
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }} 

  # --- JOB 3: EMPAQUETADO (DOCKER A GHCR) ---
  build-and-push:
    name: Construir y subir imagen Docker
    needs: performance_test 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: urielsc24  # Forzado a minúsculas
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          labels: ${{ steps.meta.outputs.labels }}

  # --- JOB 4: DESPLIEGUE AUTOMÁTICO (CD) CORREGIDO ---
  deploy:
    name: Despliegue en Servidor Privado
    needs: build-and-push 
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}
          script: |
            # Forzar a SSH a no pedir confirmación de identidad
            mkdir -p ~/.ssh
            echo "StrictHostKeyChecking no" >> ~/.ssh/config            

            # Autenticarse en GHCR (usando sudo y minúsculas)
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u urielsc24 --password-stdin
            
            # Detener y eliminar el contenedor anterior si existe (con sudo)
            sudo docker stop my-node-app || true
            sudo docker rm my-node-app || true
            
            # Descargar la versión más reciente (en minúsculas)
            sudo docker pull ghcr.io/urielsc24/pwa:main
            
            # Ejecutar el nuevo contenedor (con sudo)
            sudo docker run -d \
              --name my-node-app \
              -p 3000:3000 \
              --restart always \
              ghcr.io/urielsc24/pwa:main
