name: K6 Performance Test, SonarQube Analysis and CD

on:
  push:
    branches: [ main ] # Se activa con cada commit a la rama main

# --- VARIABLES GLOBALES AÑADIDAS ---
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- JOB 1: ANÁLISIS DE SEGURIDAD (SONARQUBE) ---
  Analysis-SAST:
    name: Análisis SAST con SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para un análisis preciso de SonarQube

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=pwa

  # --- JOB 2: PRUEBAS DE CARGA (K6) ---
  performance_test:
    name: Ejecución de Pruebas de Carga
    needs: Analysis-SAST # Esto garantiza que primero se analice la seguridad
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run k6 cloud test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6_pruebas.js
          flags: --out cloud
          token: ${{ secrets.K6_CLOUD_TOKEN }} # <--- IMPORTANTE: Se agregó esta línea para evitar el error 403
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }} # <--- Mantiene la inyección dual de seguridad

  # --- JOB 3: EMPAQUETADO (DOCKER A GHCR) AÑADIDO ---
  build-and-push:
    name: Construir y subir imagen Docker
    needs: performance_test # Dependencia estricta: Solo se ejecuta si K6 aprueba
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # --- JOB 4: DESPLIEGUE AUTOMÁTICO (CD) AÑADIDO ---
  deploy:
    name: Despliegue en Servidor Privado
    needs: build-and-push # Dependencia estricta: Solo se ejecuta si la imagen se construyó correctamente
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Configuración del Bastion Host para saltar hacia la Subred Privada de la VPC
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}
          script: |
            # Autenticarse en GHCR dentro del servidor
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Detener y eliminar el contenedor anterior si existe
            docker stop my-node-app || true
            docker rm my-node-app || true
            
            # Descargar la versión más reciente (pull)
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            
            # Ejecutar el nuevo contenedor (Mapeo 3000:3000 para la red interna)
            docker run -d \
              --name my-node-app \
              -p 3000:3000 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
